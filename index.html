<!DOCTYPE html>
<html>
<head>
<title>Mines Simulator</title>

<style>
body{
font-family:Arial;
text-align:center;
}

.board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.tile{
width:60px;
height:60px;
font-size:20px;
}
</style>

</head>
<body>

<h1>5×5 Mines Simulator</h1>

<h2 id="counter">Safe Clicks: 0</h2>

<button onclick="newGame()">New Game</button>

<div class="board" id="board"></div>

<script>

const SIZE = 25;
const MINES = 3;

let minePositions = [];
let safeClicks = 0;

function newGame(){

safeClicks = 0;
document.getElementById("counter").innerHTML =
"Safe Clicks: 0";

minePositions = [];

while(minePositions.length < MINES){

let r = Math.floor(Math.random()*25);

if(!minePositions.includes(r)){
minePositions.push(r);
}

}

const board = document.getElementById("board");
board.innerHTML = "";

for(let i=0;i<25;i++){

let btn = document.createElement("button");

btn.className = "tile";

btn.onclick = function(){

if(btn.disabled) return;

btn.disabled = true;

if(minePositions.includes(i)){

btn.innerHTML = "💣";

alert("Mine hit! Game Over");

}else{

btn.innerHTML = "✅";

safeClicks++;

document.getElementById("counter").innerHTML =
"Safe Clicks: " + safeClicks;

if(safeClicks === 22){
alert("🏆 You Win!");
}

}

};

board.appendChild(btn);

}

}

newGame();

</script>

</body>
</html>
