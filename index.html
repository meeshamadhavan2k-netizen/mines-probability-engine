<!DOCTYPE html>
<html>
<head>
<title>Mines Strategy Advisor</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.tile{
width:60px;
height:60px;
font-size:18px;
cursor:pointer;
}

.box{
margin-top:10px;
font-size:18px;
}
</style>

</head>

<body>

<h1>Mines Strategy Advisor</h1>

<h2 id="counter">Safe Clicks: 0</h2>
<h2 id="risk">Risk Level: LOW</h2>
<h2 id="suggest">Suggestion: START GAME</h2>

<button onclick="newGame()">New Game</button>

<div class="board" id="board"></div>

<div class="box" id="info"></div>

<script>

const SIZE = 25;
const MINES = 3;

let minePositions = [];
let safeClicks = 0;
let gameOver = false;

function newGame(){

safeClicks = 0;
gameOver = false;

document.getElementById("counter").innerText = "Safe Clicks: 0";
document.getElementById("risk").innerText = "Risk Level: LOW";
document.getElementById("suggest").innerText = "Suggestion: START GAME";
document.getElementById("info").innerText = "";

minePositions = [];

while(minePositions.length < MINES){
let r = Math.floor(Math.random()*25);
if(!minePositions.includes(r)){
minePositions.push(r);
}
}

const board = document.getElementById("board");
board.innerHTML = "";

for(let i=0;i<25;i++){

let btn = document.createElement("button");
btn.className = "tile";

btn.onclick = function(){

if(gameOver || btn.disabled) return;

btn.disabled = true;

if(minePositions.includes(i)){
btn.innerHTML = "💣";
gameOver = true;

document.getElementById("suggest").innerText =
"Suggestion: GAME OVER";

}else{
btn.innerHTML = "✅";
safeClicks++;

updateAdvisor();

if(safeClicks === 22){
gameOver = true;
document.getElementById("suggest").innerText =
"Suggestion: YOU WIN";
}
}

};

board.appendChild(btn);
}

}

function updateAdvisor(){

document.getElementById("counter").innerText =
"Safe Clicks: " + safeClicks;

// remaining safe and total
let remainingSafe = 22 - safeClicks;
let remainingTiles = 25 - safeClicks;

// probability next safe click
let prob = (remainingSafe / remainingTiles);

// risk calculation
let risk = 1 - prob;

let riskText = "";
let suggestion = "";

// risk zones
if(safeClicks <= 5){
riskText = "LOW";
suggestion = "CONTINUE";
}
else if(safeClicks <= 12){
riskText = "MEDIUM";
suggestion = "CAUTION - consider cashout";
}
else{
riskText = "HIGH";
suggestion = "CASH OUT NOW";
}

document.getElementById("risk").innerText =
"Risk Level: " + riskText;

document.getElementById("suggest").innerText =
"Suggestion: " + suggestion;

document.getElementById("info").innerHTML =
"Next Safe Chance: " + (prob*100).toFixed(2) + "%<br>" +
"Risk of Mine: " + (risk*100).toFixed(2) + "%";

}

newGame();

</script>

</body>
</html>
