<!DOCTYPE html>
<html>
<head>
<title>Mines Probability Simulator</title>
</head>
<body>

<h1>Mines Probability Simulator</h1>

<button onclick="run()">Run Simulation</button>

<p id="result"></p>

<script>
function run() {
  const totalTiles = 25;
  const mines = 3;

  const probability = ((totalTiles - mines) / totalTiles) * 100;

  document.getElementById("result").innerHTML =
    "Safe first click probability: " +
    probability.toFixed(2) + "%";
}
</script>

</body>
</html>
