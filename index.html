<!DOCTYPE html>
<html>
<head>
<title>Mines Advanced Simulator</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.tile{
width:60px;
height:60px;
font-size:18px;
cursor:pointer;
}

.stats{
margin-top:15px;
}
</style>

</head>

<body>

<h1>Advanced Mines Simulator</h1>

<h2 id="counter">Safe Clicks: 0</h2>
<h3 id="prob">Next Click Survival: 100%</h3>
<h3 id="mult">Multiplier: x1.00</h3>

<button onclick="newGame()">New Game</button>
<button onclick="runSimulation()">Run 10,000 Simulations</button>

<div class="board" id="board"></div>

<div class="stats" id="result"></div>

<script>

const SIZE = 25;
const MINES = 3;

let minePositions = [];
let safeClicks = 0;
let gameOver = false;

function newGame(){

safeClicks = 0;
gameOver = false;

document.getElementById("counter").innerText = "Safe Clicks: 0";
document.getElementById("prob").innerText = "Next Click Survival: 100%";
document.getElementById("mult").innerText = "Multiplier: x1.00";

minePositions = [];

while(minePositions.length < MINES){
let r = Math.floor(Math.random()*25);
if(!minePositions.includes(r)){
minePositions.push(r);
}
}

const board = document.getElementById("board");
board.innerHTML = "";

for(let i=0;i<25;i++){

let btn = document.createElement("button");
btn.className = "tile";

btn.onclick = function(){

if(gameOver || btn.disabled) return;

btn.disabled = true;

if(minePositions.includes(i)){
btn.innerHTML = "💣";
gameOver = true;
alert("Game Over!");
}else{
btn.innerHTML = "✅";
safeClicks++;

// probability of next safe click
let remainingSafe = (22 - safeClicks);
let remainingTiles = (25 - safeClicks);
let prob = (remainingSafe / remainingTiles) * 100;

document.getElementById("counter").innerText =
"Safe Clicks: " + safeClicks;

document.getElementById("prob").innerText =
"Next Click Survival: " + prob.toFixed(2) + "%";

// simple multiplier model
let mult = 1 + (safeClicks * 0.15);
document.getElementById("mult").innerText =
"Multiplier: x" + mult.toFixed(2);

if(safeClicks === 22){
gameOver = true;
alert("You Win!");
}
}

};

board.appendChild(btn);
}

}

function runSimulation(){

let wins = 0;
let trials = 10000;

for(let t=0;t<trials;t++){

let tiles = Array.from({length:25}, (_,i)=>i);
let mines = [];

while(mines.length < 3){
let r = Math.floor(Math.random()*25);
if(!mines.includes(r)) mines.push(r);
}

// simulate 1 random click survival test
let click = Math.floor(Math.random()*25);

if(!mines.includes(click)) wins++;

}

let winRate = (wins/trials)*100;

document.getElementById("result").innerHTML =
"Simulation Win Rate (1 click): " + winRate.toFixed(2) + "%";

}

newGame();

</script>

</body>
</html>
