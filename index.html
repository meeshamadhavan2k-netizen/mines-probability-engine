<!DOCTYPE html>
<html>
<head>
<title>Pro Mines Advisor</title>

<style>
body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
}

.board{
display:grid;
grid-template-columns:repeat(5,60px);
gap:5px;
justify-content:center;
margin-top:20px;
}

.tile{
width:60px;
height:60px;
font-size:18px;
cursor:pointer;
}

.box{
margin-top:10px;
font-size:16px;
}
</style>

</head>

<body>

<h1>PRO Mines Strategy Advisor</h1>

<h2 id="safe">Safe Clicks: 0</h2>
<h2 id="risk">Risk Level: LOW</h2>
<h2 id="ev">Expected Value: 1.00x</h2>
<h2 id="suggest">Suggestion: START</h2>

<button onclick="newGame()">New Game</button>

<div class="board" id="board"></div>

<div class="box" id="info"></div>

<script>

const SIZE = 25;
const MINES = 3;

let minePositions = [];
let safeClicks = 0;
let gameOver = false;

function newGame(){

safeClicks = 0;
gameOver = false;

document.getElementById("safe").innerText = "Safe Clicks: 0";
document.getElementById("risk").innerText = "Risk Level: LOW";
document.getElementById("ev").innerText = "Expected Value: 1.00x";
document.getElementById("suggest").innerText = "Suggestion: START";

minePositions = [];

while(minePositions.length < MINES){
let r = Math.floor(Math.random()*25);
if(!minePositions.includes(r)) minePositions.push(r);
}

const board = document.getElementById("board");
board.innerHTML = "";

for(let i=0;i<25;i++){

let btn = document.createElement("button");
btn.className = "tile";

btn.onclick = function(){

if(gameOver || btn.disabled) return;

btn.disabled = true;

if(minePositions.includes(i)){
btn.innerHTML = "💣";
gameOver = true;
document.getElementById("suggest").innerText = "Suggestion: LOST";
}else{
btn.innerHTML = "✅";
safeClicks++;
updateAdvisor();

if(safeClicks === 22){
gameOver = true;
document.getElementById("suggest").innerText = "Suggestion: MAX WIN";
}
}

};

board.appendChild(btn);
}

}

function updateAdvisor(){

document.getElementById("safe").innerText =
"Safe Clicks: " + safeClicks;

// remaining calculation
let safeRemaining = 22 - safeClicks;
let tilesRemaining = 25 - safeClicks;

// probability next safe
let pSafe = safeRemaining / tilesRemaining;

// risk
let risk = 1 - pSafe;

// EXPECTED VALUE MODEL (simple risk-adjusted)
let multiplier = 1 + (safeClicks * 0.15);
let ev = multiplier * pSafe;

// risk zones
let riskLevel = "";
let suggestion = "";

if(pSafe > 0.85){
riskLevel = "LOW";
suggestion = "CONTINUE";
}
else if(pSafe > 0.60){
riskLevel = "MEDIUM";
suggestion = "CONSIDER CASHOUT";
}
else{
riskLevel = "HIGH";
suggestion = "CASH OUT NOW";
}

document.getElementById("risk").innerText =
"Risk Level: " + riskLevel;

document.getElementById("ev").innerText =
"Expected Value: " + ev.toFixed(2) + "x";

document.getElementById("suggest").innerText =
"Suggestion: " + suggestion;

document.getElementById("info").innerHTML =
"Next Safe Chance: " + (pSafe*100).toFixed(2) + "%<br>" +
"Risk of Loss: " + (risk*100).toFixed(2) + "%";

}

newGame();

</script>

</body>
</html>
